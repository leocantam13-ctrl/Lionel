<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lionel 🦁</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .chat-bg { background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%); }
    .message-user { background: #facc15; color: #000; border-radius: 20px 20px 5px 20px; }
    .message-lionel { background: #27272a; border-radius: 20px 20px 20px 5px; }
  </style>
</head>
<body class="bg-black text-white min-h-screen chat-bg pb-20">

  <!-- BARRA INFERIOR -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-yellow-500 z-50">
    <div class="max-w-xl mx-auto flex justify-around py-3">
      <button onclick="showScreen('chats')" class="flex flex-col items-center text-yellow-400 active:scale-95">
        <i class="fas fa-comments text-2xl"></i><span class="text-xs mt-1">Chats</span>
      </button>
      <button onclick="showScreen('chat')" class="flex flex-col items-center text-yellow-400 active:scale-95">
        <i class="fas fa-comment-dots text-2xl"></i><span class="text-xs mt-1">Conversar</span>
      </button>
      <button onclick="showScreen('memory')" class="flex flex-col items-center text-yellow-400 active:scale-95">
        <i class="fas fa-brain text-2xl"></i><span class="text-xs mt-1">Memória</span>
      </button>
      <button onclick="showScreen('settings')" class="flex flex-col items-center text-yellow-400 active:scale-95">
        <i class="fas fa-cog text-2xl"></i><span class="text-xs mt-1">Config</span>
      </button>
    </div>
  </div>

  <!-- TELA CHATS -->
  <div id="screen-chats" class="screen p-5">
    <h1 class="text-4xl font-bold text-yellow-400 flex items-center gap-3 mb-8"><span>🦁</span> Lionel</h1>
    <button onclick="newChat()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-semibold py-5 rounded-3xl text-lg mb-8">
      + Nova Conversa
    </button>
    <div id="chat-list" class="space-y-4"></div>
  </div>

  <!-- TELA CONVERSA -->
  <div id="screen-chat" class="screen hidden flex flex-col h-screen">
    <div class="bg-zinc-900 p-4 flex items-center gap-3 border-b border-yellow-500">
      <button onclick="showScreen('chats')" class="text-3xl pr-4">←</button>
      <div>
        <h2 id="chat-title" class="font-semibold text-xl">Nova Conversa</h2>
        <p class="text-yellow-400 text-sm">Lionel 🦁 • Online</p>
      </div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-5 space-y-7"></div>

    <div class="px-5 pb-4">
      <div id="suggestions" class="flex gap-3 overflow-x-auto pb-4"></div>
    </div>

    <div class="p-4 bg-zinc-900 border-t border-yellow-500">
      <div class="flex gap-3">
        <input id="user-input" type="text" placeholder="Mensagem para Lionel..." 
               class="flex-1 bg-zinc-800 rounded-3xl px-6 py-5 outline-none focus:ring-2 focus:ring-yellow-400 text-base">
        <button onclick="sendMessage()" class="bg-yellow-500 hover:bg-yellow-400 w-14 h-14 rounded-3xl flex items-center justify-center text-black text-2xl">
          ↑
        </button>
      </div>
    </div>
  </div>

  <!-- TELA MEMÓRIA -->
  <div id="screen-memory" class="screen hidden p-5">
    <h1 class="text-3xl font-bold text-yellow-400 mb-6">🧠 Memória de Lionel</h1>
    <button onclick="addManualMemory()" class="w-full bg-zinc-800 hover:bg-zinc-700 py-5 rounded-3xl mb-8 text-lg">
      + Adicionar Memória Manualmente
    </button>
    <div id="memory-list" class="space-y-5"></div>
  </div>

  <!-- TELA CONFIG -->
  <div id="screen-settings" class="screen hidden p-5">
    <h1 class="text-3xl font-bold text-yellow-400 mb-6">⚙️ Configurações</h1>
    
    <div class="bg-zinc-900 rounded-3xl p-6">
      <p class="mb-3 text-sm">Sua Chave API Gemini</p>
      <input id="api-key" type="password" placeholder="sk-..." class="w-full bg-black border border-yellow-500 rounded-2xl px-5 py-5 text-sm">
      <button onclick="saveApiKey()" class="mt-6 w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-5 rounded-3xl">
        Salvar Chave API
      </button>
    </div>

    <div class="mt-10 text-sm leading-relaxed text-zinc-400">
      <p class="font-medium text-yellow-400 mb-2">Como pegar a chave:</p>
      <ol class="list-decimal pl-5 space-y-2">
        <li>Acesse <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-yellow-400 underline">aistudio.google.com</a></li>
        <li>Clique em "Criar chave API"</li>
        <li>Cole a chave acima</li>
      </ol>
    </div>
  </div>

<script>
// Configurações
let apiKey = localStorage.getItem('gemini_api_key') || '';
let currentChatId = null;
let chats = JSON.parse(localStorage.getItem('lionel_chats') || '{}');
let memories = JSON.parse(localStorage.getItem('lionel_memories') || '[]');

const SYSTEM_PROMPT = `Você é Lionel, um leão sábio, protetor e carismático. Fale de forma calorosa, nobre e amigável com o usuário. Use "meu caro explorador", "companheiro" ou o nome dele quando souber.
Memórias atuais: \( {memories.map(m => ` \){m.key}: ${m.value}`).join(" | ") || "Nenhuma ainda."}
Responda sempre em português do Brasil. Seja útil e honesto.`;

async function callGemini(messages) {
  if (!apiKey) {
    alert("Configure sua chave API primeiro!");
    showScreen('settings');
    return null;
  }

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        contents: [{role: "user", parts: [{text: SYSTEM_PROMPT}]}].concat(messages.map(m => ({
          role: m.role === "user" ? "user" : "model",
          parts: [{text: m.content}]
        })))
      })
    });

    if (!res.ok) throw new Error("API error");
    const data = await res.json();
    return data.candidates[0].content.parts[0].text;
  } catch(e) {
    console.error(e);
    return "Ruge suavemente... Estou com dificuldade para me conectar agora. Pode tentar novamente?";
  }
}

function showScreen(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(`screen-${screen}`).classList.remove('hidden');
  if (screen === 'chats') renderChatList();
  if (screen === 'memory') renderMemories();
}

function newChat() {
  currentChatId = Date.now().toString();
  chats[currentChatId] = { title: "Nova Conversa", messages: [] };
  saveChats();
  loadChat(currentChatId);
}

function loadChat(id) {
  currentChatId = id;
  document.getElementById('chat-title').textContent = chats[id].title;
  const msgDiv = document.getElementById('messages');
  msgDiv.innerHTML = '';
  chats[id].messages.forEach(m => addMessage(m.role, m.content));
  showScreen('chat');
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
  div.innerHTML = `
    <div class="max-w-[85%] p-4 ${role === 'user' ? 'message-user' : 'message-lionel'}">
      \( {role === 'lionel' ? '🦁 ' : ''} \){content}
    </div>`;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior: "smooth"});
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || !currentChatId) return;

  addMessage('user', text);
  const chat = chats[currentChatId];
  chat.messages.push({role: 'user', content: text});
  input.value = '';

  const loadingDiv = document.createElement('div');
  loadingDiv.className = "text-yellow-400 pl-4";
  loadingDiv.textContent = "Lionel está pensando... 🦁";
  document.getElementById('messages').appendChild(loadingDiv);

  const response = await callGemini(chat.messages);
  loadingDiv.remove();
  
  if (response) {
    addMessage('lionel', response);
    chat.messages.push({role: 'lionel', content: response});
    
    if (chat.messages.length <= 3) {
      chat.title = response.slice(0, 35) + "...";
      document.getElementById('chat-title').textContent = chat.title;
    }
  }
  
  saveChats();
}

function renderChatList() {
  const container = document.getElementById('chat-list');
  container.innerHTML = Object.entries(chats).map(([id, chat]) => `
    <div onclick="loadChat('${id}')" class="bg-zinc-900 hover:bg-zinc-800 p-5 rounded-3xl cursor-pointer">
      <div class="font-medium">${chat.title}</div>
      <div class="text-xs text-zinc-400 mt-1 line-clamp-2">${chat.messages[chat.messages.length-1]?.content || ''}</div>
    </div>
  `).join('');
}

function saveChats() {
  localStorage.setItem('lionel_chats', JSON.stringify(chats));
}

function saveApiKey() {
  apiKey = document.getElementById('api-key').value.trim();
  if (apiKey) {
    localStorage.setItem('gemini_api_key', apiKey);
    alert("✅ Chave salva!");
  }
}

// Memória (melhorada depois)
function renderMemories() { /* ... */ }
function addManualMemory() { /* ... */ }

// Inicialização
if (Object.keys(chats).length === 0) newChat();
showScreen('chats');
if (apiKey) document.getElementById('api-key').value = apiKey;
</script>
</body>
</html>
