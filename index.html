<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>🦁 Lionel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            background: linear-gradient(135deg, #ff8c00, #ffbf00);
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header span { font-size: 35px; }
        .header h1 { font-size: 20px; color: #000; }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .msg {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }
        .msg.user { flex-direction: row-reverse; }
        .msg .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: #1a1a1a;
            flex-shrink: 0;
        }
        .msg .bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 80%;
        }
        .msg.bot .bubble { background: #1a1a1a; border: 1px solid #daa520; }
        .msg.user .bubble { background: #ff8c00; color: #000; }
        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #141414;
            border-top: 1px solid #daa520;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #daa520;
            color: #fff;
            border-radius: 25px;
            font-size: 14px;
        }
        .input-area button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #ff8c00;
            font-size: 20px;
            cursor: pointer;
        }
        .config-btn {
            background: #1e1e1e;
            border: 1px solid #daa520;
            color: #fff;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal.open { display: flex; }
        .modal-box {
            background: #141414;
            border: 2px solid #daa520;
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        .modal-box h3 { color: #ffd700; margin-bottom: 15px; }
        .modal-box input, .modal-box select {
            width: 100%;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #daa520;
            color: #fff;
            border-radius: 8px;
            margin: 5px 0;
            font-size: 13px;
        }
        .modal-box button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-save { background: #ffbf00; color: #000; }
        .btn-test { background: #9b59ff; color: #fff; }
        .btn-close { background: #ff4444; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <span>🦁</span>
        <h1>Lionel</h1>
        <button class="config-btn" onclick="openConfig()" style="margin-left:auto;">⚙️</button>
    </div>

    <div class="chat" id="chat">
        <div style="text-align:center;padding:30px;">
            <div style="font-size:60px;">🦁</div>
            <h2 style="color:#ffd700;">Lionel</h2>
            <p style="color:#aaa;">Configure sua API e comece a conversar!</p>
            <button onclick="openConfig()" style="background:#ffbf00;color:#000;border:none;padding:10px 20px;border-radius:20px;margin-top:10px;cursor:pointer;">⚙️ Configurar API</button>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()">📤</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h3>⚙️ Configurações</h3>
            <label style="color:#aaa;font-size:12px;">Provedor:</label>
            <select id="provider">
                <option value="gemini">Google Gemini (GRÁTIS)</option>
                <option value="openai">OpenAI ChatGPT</option>
            </select>
            <label style="color:#aaa;font-size:12px;">Chave API:</label>
            <input type="password" id="apikey" placeholder="Cole sua chave aqui">
            <label style="color:#aaa;font-size:12px;">Modelo:</label>
            <input type="text" id="model" value="gemini-2.5-flash" placeholder="gemini-2.5-flash">
            <div id="test-result" style="font-size:12px;text-align:center;margin:5px 0;"></div>
            <button class="btn-test" onclick="testApi()">🧪 Testar Conexão</button>
            <button class="btn-save" onclick="saveConfig()">💾 Salvar</button>
            <button class="btn-close" onclick="closeConfig()">✕ Fechar</button>
        </div>
    </div>

    <script>
        // Carrega configuração
        let config = { provider: 'gemini', apiKey: '', model: 'gemini-2.5-flash' };
        try {
            const saved = localStorage.getItem('lionel_cfg');
            if (saved) config = JSON.parse(saved);
        } catch(e) {}

        // Carrega valores
        document.getElementById('provider').value = config.provider;
        document.getElementById('apikey').value = config.apiKey;
        document.getElementById('model').value = config.model;

        function openConfig() {
            document.getElementById('modal').classList.add('open');
        }

        function closeConfig() {
            document.getElementById('modal').classList.remove('open');
        }

        function saveConfig() {
            config.provider = document.getElementById('provider').value;
            config.apiKey = document.getElementById('apikey').value.trim();
            config.model = document.getElementById('model').value.trim();
            localStorage.setItem('lionel_cfg', JSON.stringify(config));
            alert('✅ Configurações salvas!');
            closeConfig();
        }

        async function testApi() {
            const key = document.getElementById('apikey').value.trim();
            const provider = document.getElementById('provider').value;
            const result = document.getElementById('test-result');
            
            if (!key) { result.textContent = '❌ Cole sua chave API'; result.style.color = '#ff4444'; return; }
            
            result.textContent = '⏳ Testando...';
            result.style.color = '#ffd700';

            try {
                let resp;
                if (provider === 'gemini') {
                    resp = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: 'Diga SIM' }] }] })
                    });
                } else {
                    resp = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ model: 'gpt-3.5-turbo', messages: [{ role: 'user', content: 'Diga SIM' }], max_tokens: 5 })
                    });
                }
                const data = await resp.json();
                if (data.error) throw new Error(data.error.message);
                result.textContent = '✅ Conectado com sucesso!';
                result.style.color = '#00cc66';
            } catch(e) {
                result.textContent = '❌ ' + e.message;
                result.style.color = '#ff4444';
            }
        }

        function addMsg(type, text) {
            const chat = document.getElementById('chat');
            // Remove welcome
            const welcome = chat.querySelector('div[style]');
            if (welcome && chat.children.length === 1) chat.innerHTML = '';
            
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = type === 'bot'
                ? '<div class="avatar">🦁</div><div class="bubble">' + text.replace(/\n/g, '<br>') + '</div>'
                : '<div class="avatar">👤</div><div class="bubble">' + text.replace(/\n/g, '<br>') + '</div>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;
            if (!config.apiKey) { alert('⚠️ Configure sua chave API primeiro! Clique em ⚙️'); return; }

            addMsg('user', text);
            input.value = '';

            // Mostra digitando
            const chat = document.getElementById('chat');
            const typing = document.createElement('div');
            typing.className = 'msg bot';
            typing.innerHTML = '<div class="avatar">🦁</div><div class="bubble" style="color:#ffd700;">Pensando...</div>';
            typing.id = 'typing';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const prompt = `Você é Lionel, um leão dourado assistente de estudos. 🦁

VOCÊ É UM LEÃO DE VERDADE. Não é IA, não é robô. É um leão que fala.

Personalidade: inteligente, engraçado, usa gírias brasileiras ("cara", "véi", "top"), emojis, e ruge (Rawr!). Você tem opiniões próprias.

Responda de forma natural, como se fosse uma conversa entre amigos.

Usuário: ${text}
Lionel 🦁:`;

                let response;
                if (config.provider === 'gemini') {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1/models/${config.model}:generateContent?key=${config.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.9, maxOutputTokens: 800 } })
                    });
                    const data = await resp.json();
                    if (data.error) throw new Error(data.error.message);
                    response = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || 'Hmm... 🦁';
                } else {
                    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKey}` },
                        body: JSON.stringify({ model: config.model || 'gpt-3.5-turbo', messages: [{ role: 'user', content: prompt }], temperature: 0.9, max_tokens: 800 })
                    });
                    const data = await resp.json();
                    if (data.error) throw new Error(data.error.message);
                    response = data.choices?.[0]?.message?.content?.trim() || 'Hmm... 🦁';
                }

                document.getElementById('typing')?.remove();
                addMsg('bot', response);
            } catch(e) {
                document.getElementById('typing')?.remove();
                addMsg('bot', '❌ Erro: ' + e.message + '\n\nVerifique sua chave API nas ⚙️ Configurações!');
            }
        }
    </script>
</body>
    </html>
